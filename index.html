<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  <title>抽籤頁面</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>抽籤系統</h1>
    <p>座號範圍：1 號到 23 號</p>

    </div>
  </main>
  <script src="script.js"></script>
